apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  workspaces:
    - name: output
  steps:
    - name: cleanup
      image: alpine
      workingDir: /workspace/output
      script: |
        #!/bin/sh
        echo "Cleaning workspace"
        rm -rf ./*

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-test
spec:
  workspaces:
    - name: source
  steps:
    - name: run-tests
      image: python:3.9-slim
      workingDir: /workspace/source
      script: |
        #!/bin/sh
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install nose
        nosetests -v